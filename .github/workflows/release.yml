name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "custom_components/rieg_energy/manifest.json"
      - "hacs.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  release:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read integration version
        id: version
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("custom_components/rieg_energy/manifest.json").read_text(encoding="utf-8"))
          print(f"version={manifest['version']}")
          with open(Path.cwd() / Path(".github_version"), "w", encoding="utf-8") as fh:
              fh.write(manifest["version"])
          PY
          echo "version=$(cat .github_version)" >> "$GITHUB_OUTPUT"
      - name: Create integration archive
        run: |
          mkdir -p dist
          cd custom_components
          zip -r ../dist/rieg_energy_${{ steps.version.outputs.version }}.zip rieg_energy
      - name: Create tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          custom_tag: v${{ steps.version.outputs.version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/rieg_energy_${{ steps.version.outputs.version }}.zip
